{% load i18n basefilters static %}
{% is_manager_of request.user instance as can_manage %}
{% if perms.attendance.change_attendance or can_manage %}
    <div class="oh-btn-group w-100" onclick="event.stopPropagation();">
        <a href='{% url "validate-this-attendance" instance.id %}' hx-target="#updateAttendanceBody"
            onclick="return confirm(`{% trans 'Do you want to validate this attendance?'%}`)"
            data-req="/attendance/request-attendance-view/?id={{instance.id}}"
            onclick="event.stopPropagation(); {% if instance.is_validate_request %}  event.preventDefault(); showApproveAlert($(this).data('req')); {% endif %}"
            class="w-24 px-4 py-2 bg-primary-600 text-white rounded-md text-xs flex items-center justify-center gap-2 hover:bg-primary-800 transition duration-300"
            >
            <img src="{% static 'horilla_theme/assets/img/icons/check.svg' %}" alt="{% trans 'Approve' %}" width="13"
            class="filter brightness-0 invert" />
        </a>
    </div>
{% endif %}
