{% load static i18n generic_template_filters %}

<div class="oh-btn-group w-100">

    {% if perms.recruitment.change_recruitmentsurvey %}
        <a class="w-24 px-4 py-2 bg-primary-600 text-white rounded-md text-xs flex items-center justify-center gap-2 hover:bg-primary-800 transition duration-300" title="{% trans 'Edit' %}"
        hx-get="{% url 'recruitment-survey-question-template-edit' instance.id %}"
        hx-target="#genericModalBody"
        data-toggle="oh-modal-toggle"
        data-target="#genericModal">
        <img src="{% static 'horilla_theme/assets/img/icons/edit.svg' %}" alt="{% trans 'Edit' %}" width="13"
        class="filter brightness-0 invert" />
        {% trans 'Edit' %}
        </a>
    {% endif %}

    {% if perms.recruitment.delete_recruitmentsurvey %}
        <a
            class="w-24 px-4 py-2 bg-white rounded-md text-xs flex items-center justify-center gap-2 border border-primary-500 hover:border-primary-600 transition duration-300"
            title="{% trans 'Delete' %}"
            href="{% url 'recruitment-survey-question-template-delete' instance.id %}"
            onclick="return confirm('{% trans 'Are you sure you want to delete this survey question template?' %}')">
            <img src="{% static 'horilla_theme/assets/img/icons/trash.svg' %}" alt="{% trans 'Delete' %}" width="13"
            class="mt-[-1px]" />
            {% trans 'Delete' %}
        </a>
    {% endif %}
</div>
