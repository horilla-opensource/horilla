{% load basefilters i18n static %}
{% if perms.recruitment.change_interviewschedule or request.user.employee_get in instance.employee_id.all %}
    <a class="oh-btn oh-btn--info w-100"
		data-toggle="oh-modal-toggle" data-target="#genericModal"
		hx-get="{% url 'edit-interview' instance.id %}?instances_ids={{ instance.ordered_ids }}"
        hx-swap="innerHTML"
		hx-target="#genericModalBody">
		<img src="{% static 'horilla_theme/assets/img/icons/edit.svg' %}" alt="{% trans 'Edit' %}" width="13"
			class="filter brightness-0 invert" />{% trans "Edit" %}
	</a>
{% endif %}
{% if perms.recruitment.delete_interviewschedule %}
    <a class="w-24 px-4 py-2 bg-white rounded-md text-xs flex items-center justify-center gap-2 border border-primary-500 hover:border-primary-600 transition duration-300"
		hx-confirm="{% trans 'Are you sure you want to delete this interview?' %}"
		hx-post="{% url 'delete-interview' instance.id %}"
		hx-target="#genericModalBody">
		<img src="{% static 'horilla_theme/assets/img/icons/trash.svg' %}" alt="{% trans 'Delete' %}" width="16"
			class="mt-[-1px]">
		{% trans "Delete" %}
	</a>
{% endif %}
