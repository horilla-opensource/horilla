{% load i18n static %}

{% if instance.is_approved and instance.status == 'requested' %}
	<a
		href="{% url 'request-approve' instance.id %}"
		title="{% trans 'Approve' %}"
		class="h-8 w-24 px-4 py-2 bg-primary-600 text-white rounded-md text-xs flex items-center justify-center gap-2 hover:bg-primary-800 transition duration-300"
		{% if instance.end_date.month <= current_date.month %}
			onclick = "return confirm('Do You really want to Approve this request?')";
		{% else %}
			onclick = "leaveRequestConfirm(`This leave request is for the month of {{instance.start_date|date:'F'}}. Approval depends on the {{instance.employee_id.get_full_name}} having available leave days for this month.`,event);"
		{% endif %}
	>
		<img src="{% static 'horilla_theme/assets/img/icons/check.svg' %}" alt="{% trans 'Approve' %}" width="13"
		class="filter brightness-0 invert" /> {% trans 'Approve' %}
	</a>
{% else %}
	<a
		type="submit"
		href="#"
		title="{% trans 'Approve' %}"
		class="h-8 w-24 px-4 py-2 bg-primary-600 text-white rounded-md text-xs flex items-center justify-center gap-2 hover:bg-primary-800 transition duration-300 oh-btn--disabled"
	>
		<img src="{% static 'horilla_theme/assets/img/icons/check.svg' %}" alt="{% trans 'Approve' %}" width="13"
		class="filter brightness-0 invert" /> {% trans 'Approve' %}
	</a>
{% endif %}

<button
	data-toggle="oh-modal-toggle"
	data-target="#penaltyModal"
	hx-target="#penaltyModalBody"
	hx-get="{% url 'leave-cut-penalty' instance.id %}"
	type="submit"
	class="h-8 w-24 px-4 py-2 bg-white rounded-md text-xs flex items-center justify-center gap-2 border border-primary-500 hover:border-primary-600 transition duration-300"
	title="{% trans 'Penalty' %}"
	id="penaltyButton"
>
	<ion-icon
		name="information-circle-outline"
		role="img"
		class="md hydrated"
		aria-label="information circle outline"
	></ion-icon> {% trans 'Penalty' %}
</button>

{% if instance.status != 'rejected' and instance.end_date >= current_date %}
	<a
		type="submit"
		data-toggle="oh-modal-toggle"
		data-target="#rejectModal"
		hx-get="{% url 'request-cancel' instance.id %}"
		hx-target="#rejectForm"
		title="{% trans 'Reject' %}"
		class="h-8 w-24 px-4 py-2 bg-white rounded-md text-xs flex items-center justify-center gap-2 border border-primary-500 hover:border-primary-600 transition duration-300"
	>
		<img src="{% static 'horilla_theme/assets/img/icons/close-circle-icon-original.svg' %}" alt="{% trans 'Reject' %}" width="13"
		class="mt-[-1px]" /> {% trans 'Reject' %}
	</a>
{% else %}
	<a
		type="submit"
		href="#"
		title="{% trans 'Reject' %}"
		class="h-8 w-24 px-4 py-2 bg-white rounded-md text-xs flex items-center justify-center gap-2 border border-primary-500 hover:border-primary-600 transition duration-300 oh-btn--disabled"
	>
		<img src="{% static 'horilla_theme/assets/img/icons/close-circle-icon-original.svg' %}" alt="{% trans 'Reject' %}" width="13"
		class="mt-[-1px]" /> {% trans 'Reject' %}
	</a>
{% endif %}
