{% load basefilters static i18n %}
<style>
	tr span.txt {
		display:none;
	}
</style>
{% is_manager_of request.user instance as can_manage %}
	<div class="oh-btn-group w-100">
		{% if request.user|is_reportingmanager or perms.attendance.change_attendance %}
            <a href="{% url 'approve-validate-attendance-request' instance.id %}"
                class="h-8 w-24 px-4 py-2 bg-primary-600 text-white rounded-md text-xs flex items-center justify-center gap-2 hover:bg-primary-800 transition duration-300"
                title="{% trans 'Approve' %}"
                >
                    <img class="brightness-0 invert" src="{% static 'horilla_theme/assets/img/icons/check.svg' %}" alt="{% trans 'Approve' %}" width="13"
                />

            </a>
        {% endif %}

		{% if request.user|is_reportingmanager or perms.attendance.change_attendance %}
            <a href="{% url 'cancel-validate-attendance-request' instance.id %}" data-toggle="oh-modal-toggle"
                class="w-24 px-4 py-2 bg-white rounded-md text-xs flex items-center justify-center gap-2 border border-primary-500 hover:border-primary-600 transition duration-300"
                title="{% trans 'Reject' %}"
                >
                <img class="mt-[-1px]" src="{% static 'horilla_theme/assets/img/icons/close.svg' %}" alt="{% trans 'Reject' %}" width="13"
            />
            </a>
        {% endif %}
    </div>
