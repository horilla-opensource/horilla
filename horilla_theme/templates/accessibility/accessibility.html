{% extends "settings.html" %}
{% load static i18n %}
{% block settings %}
<style>
	.accessibilityBody {
		overflow: hidden;
		transition: max-height 0.3s ease;
	}

	.accessibilityBody.open {
		max-height: 70vh;
		overflow-y: auto;
	}
</style>

<div id="response" hidden></div>

<div
	class="flex gap-2 accordion-btn-stng bg-primary-100 font-medium items-center px-3 py-3 text-primary-600 border border-primary-300 rounded-md w-full mb-3"
>
	<h5 class="text-sm font-semibold">{% trans "Default Accessibility" %}</h5>
	<span
		class="oh-info mr-2 mb-2"
		title="{% trans 'Limit default view access to horilla feature' %}"
	></span>
</div>

<div
	class="shadow-card p-3 border border-[#eee6e6b9] rounded-md"
	id="accessibilityContainer"
>
	{% for item, display in accessibility %}
	<div class="border border-[#ebebeb] rounded-md overflow-hidden mb-2">
		<div
			class="inner-accordion-toggle w-full text-xs font-semibold bg-[#f3f3f3] px-4 py-3 text-[#333] flex items-center gap-2 perm-accordion justify-between cursor-pointer"
		>
			<span>{{display}}</span>
			<button
				class="btn-square btn-square2 w-14 h-8 cursor-pointer bg-[#ff000024] text-xs text-[red] disabled:cursor-not-allowed"
				data-feature-id = "{{item}}_body"
				title="{% trans 'Clear Filters' %}"
			>
				<i class="fa-solid fa-xmark"></i>
			</button>
		</div>

		<div
			class="panel inner-accordion-content transition-all duration-300 overflow-hidden max-h-0 accessibilityBody"
			id="{{item}}_body"
			hx-get="{% url 'load-accessibility-form' %}?feature={{item}}"
			hx-trigger="loadForm once"
			hx-target="this"
			hx-swap="innerHTML"
		>
			<div class="animated-background"></div>
		</div>
	</div>
	{% endfor %}
</div>

<script>
    $(document).ready(function(){
		bindInnerAccordions();
            $(".btn-square2").on("click", function(e){
                e.stopPropagation();
                let featureId = $(this).data("featureId")
                Swal.fire({
                    title: '{% trans "Are you sure?" %}',
                    text: '{% trans "This will clear all filters you have applied." %}',
                    icon: "warning",
                    showCancelButton: true,
                    confirmButtonColor: "#3085d6",
                    cancelButtonColor: "#d33",
                    confirmButtonText: `{% trans 'Yes' %}, {% trans 'Clear it' %}!`,
                }).then((result) => {
                    if (result.isConfirmed) {
                        $(`#${featureId} select`)
                            .val(null)
                            .trigger("change");
                        $(`#${featureId}`)
                            .find("input[type=submit]")
                            .click();
                    }
                });
            })

    })

	function bindInnerAccordions() {
		document
			.querySelectorAll(".inner-accordion-toggle")
			.forEach((toggle) => {
				toggle.addEventListener("click", function () {
					const content = this.nextElementSibling;
					htmx.trigger(content, "loadForm");
					content.classList.toggle("open");
				});
			});
	}

	$(document).on("change", ".excludeAll", function () {
		let feature = $(this).data("accessibility");
		let isChecked = $(this).is(":checked");
		let formContainer = $(`#${feature}formcontainer`);

		$(this).closest("form").find("input[type=submit]").click();

		if (isChecked) {
			formContainer.hide();
		} else {
			formContainer.show();
		}
	});

	$("#accessibilityContainer").on("change", "select", function (e) {
		const form = $(this).closest("form");
		if (form.data("initializing")) return;
		form.find("input[type=submit]").click();
	});

    {% comment %} // HTMX event handling
    document.body.addEventListener('htmx:afterSwap', function() {
        // Reinitialize accordions after content changes
        bindInnerAccordions();
        // Reinitialize Select2 after content changes
        $('select').addClass('oh-select oh-select-2').select2();
    }); {% endcomment %}
</script>
{% endblock settings %}
