{% load i18n %}
<h3 class="oh-faq-card__title">{% trans 'Attachments' %}</h3>
<span class="oh-card__footer--border-top pt-1 mb-3" style="display: block;"></span>
{% if reimbursement.attachment %}
<div id="attachmentContainerPrimary">
    <div class="oh-btn-group" style="width: 10%;">
        <button onclick="window.open('{{ reimbursement.attachment.url }}', '_blank')" class="oh-btn oh-btn--light text-dark"><ion-icon name="eye-outline"></ion-icon></button>
    </div>
    <iframe style="width: 100%;height: 200px;" height="100" src="{{ reimbursement.attachment.url }}" frameborder="0"></iframe>
</div>
{% endif %}
{% for attachment in reimbursement.other_attachments.all %}
<div id="attachmentContainer{{forloop.counter}}">
    <div class="oh-btn-group" style="width: 10%;">
        <button onclick="window.open('{{ attachment.attachment.url }}', '_blank')" class="oh-btn oh-btn--light text-dark"><ion-icon name="eye-outline"></ion-icon></button>
    </div>
    <iframe style="width: 100%;height: 200px;" height="100" src="{{ attachment.attachment.url }}" frameborder="0"></iframe>
</div>
{% endfor %}
<div class="d-flex flex-row-reverse">
  <button onclick="$('.oh-modal--show').toggleClass('oh-modal--show');" class="oh-btn oh-btn--secondary mt-2 mr-0 pl-4 pr-5 oh-btn--w-100-resp">{% trans 'Close' %}</button>
</div>
