{% load i18n %}
{% comment %} # 875 {% endcomment %}

<div id="ack-message-{{ employee.id }}"></div>

<form id="ack-form-{{ employee.id }}" class="oh-general__tab-target oh-profile-section"
      hx-post="{% url 'send-mail-to-employee' %}" hx-target="#ack-message-{{ employee.id }}"
      hx-encoding="multipart/form-data" onsubmit="return handleFormSubmit(event, {{ employee.id }})">
    <input type="hidden" name="id" value="{{ employee.id }}">

    <div class="modal-body">

        {% if employee %}
            <div class="oh-timeoff-modal__profile-content">
                <div class="oh-profile mb-2">
                    <div class="oh-profile__avatar">
                        <img src="{{ employee.get_avatar }}" class="oh-profile__image me-2" alt="Employee Avatar">
                    </div>
                    <div class="oh-timeoff-modal__profile-info">
                        <span class="oh-timeoff-modal__user fw-bold">{{ employee.get_full_name }}</span>
                        <span class="oh-timeoff-modal__user m-0" style="font-size: 15px; color: #4d4a4a">
                            {{ employee.get_job_position }} / {{ employee.get_department }}
                        </span>
                    </div>
                </div>
            </div>
        {% endif %}

        <!-- Also Send To -->
        <div class="form-group mt-2">
            <label for="employees"><h6>{% trans "Also send to" %}</h6></label>
            <select class="oh-select oh-select-2" name="employees" id="employees" multiple {% if not employee %} required {% endif %}>
                {% for emp in employees %}
                    <option value="{{ emp.id }}">{{ emp }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Subject -->
        <div class="form-group mt-2">
            <label for="subject"><h6>{% trans "Subject" %}</h6></label>
            <input required type="text" name="subject" class="oh-input w-100" id="subject" placeholder="Important Reminder">
        </div>

        <!-- Template -->
        <div class="form-group mt-2">
            <label for="template"><h6>{% trans "Template" %}</h6></label>
            <select name="template" class="w-100 oh-select" id="template" hx-on:change="loadTemplate(this)">
                <option value="">----</option>
                {% for template in templates %}
                    <option value="{{ template.id }}">{{ template.title }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Message Body -->
        <div class="form-group mt-2">
            <label for="body"><h6>{% trans "Message Body" %}</h6></label>
            <div class="oh-input__group">
                <div class="oh-tabs__view-buttons mt-2 d-flex gap-1">
                    <button type="button" class="oh-btn oh-btn--secondary oh-btn--small px-3 tab-btn" data-tab="write" id="writeTabBtn">
                        <ion-icon name="create-outline" class="me-1"></ion-icon>
                        {% trans "Write" %}
                    </button>
                    <button type="button" class="oh-btn oh-btn--secondary oh-btn--small px-3 tab-btn" data-tab="preview" id="previewTabBtn">
                        <ion-icon name="eye-outline" class="me-1"></ion-icon>
                        {% trans "Preview" %}
                    </button>
                </div>
                <div id="write" class="oh-tabs__view active">
                    <textarea id="writeField" data-summernote name="body" required
                              class="oh-input oh-input--textarea" placeholder="Type something here..."></textarea>
                </div>
            </div>
        </div>

        <div class="form-hint" style="margin-top: 10px; font-size: 14px; color: #888;">
            {% trans "Hint: Type '{' to get sender or receiver data" %}
        </div>

        <!-- Template as Attachment -->
        <div class="form-group mt-2">
            <label for="template_attachments"><h6>{% trans "Template as Attachment" %}</h6></label>
            <select name="template_attachments" class="w-100 oh-select" id="template_attachments" multiple>
                {% for template in templates %}
                    <option value="{{ template.id }}">{{ template.title }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Other Attachments -->
        <div class="form-group mt-2">
            <label for="other_attachments"><h6>{% trans "Other Attachments" %}</h6></label>
            <input type="file" name="other_attachments" id="other_attachments" multiple style="display: block;">
        </div>

        <div id="messages"></div>

        <div class="modal-footer d-flex flex-row-reverse mt-3">
            <button type="submit" class="oh-btn oh-btn--secondary submit-send">{% trans "Send Mail" %}</button>
        </div>
    </div>
</form>

<script>
    // ---------- UTILITIES ----------
    function showError(message) {
        $("#messages").html(`<div class="oh-alert oh-alert--animated oh-alert--danger" role="alert">${message}</div>`);
    }
    function clearErrors() { $("#messages").empty(); }

    function getCsrfToken() {
        var t = $('input[name=csrfmiddlewaretoken]').val();
        if (t) return t;
        var m = document.cookie.match(/csrftoken=([^;]+)/);
        return m ? m[1] : '';
    }

    function setWriteFieldHtml(html) {
        if ($('#writeField').next('.note-editor').length) {
            $('#writeField').summernote('code', html);
        } else {
            $('#writeField').val(html);
        }
    }

    // ---------- VALIDATION ----------
    function validateForm(formId, hasEmployee) {
        clearErrors();
        let valid = true;
        if (!$('#employees').val().length && !hasEmployee) {
            showError("Please select at least one employee.");
            valid = false;
        } else if (!$("#subject").val().trim()) {
            showError("The message subject is required.");
            valid = false;
        } else {
            let body = $(`#writeField`).summernote('code');
            if (!body || body === '<p><br></p>') {
                showError("The message body is required.");
                valid = false;
            }
        }
        return valid;
    }

    // ---------- FORM SUBMIT ----------
    function handleFormSubmit(event, empId) {
        event.preventDefault();
        const hasEmployee = "{{employee|default:'false'|safe}}" !== "false";
        if (!validateForm(empId, hasEmployee)) return false;

        Swal.fire({
            title: "Processing",
            text: "Mail will be sent in the background",
            icon: "info",
            timer: 1500,
            showConfirmButton: false
        });
        return true;
    }

    // ---------- TEMPLATE LOAD (on select change) ----------
    function loadTemplate(select) {
        const id = $(select).val();
        if (!id) return;
        $.ajax({
            type: "get",
            url: `/employee/get-template/${id}/`,
            dataType: "json",
            beforeSend: () => { $('#writeField').summernote('disable'); },
            success: function(response) { $('#writeField').summernote('code', response.body); },
            complete: () => { $('#writeField').summernote('enable'); }
        });
    }

    function loadTemplateIntoWriteField() {
        var id = $("#template").val();
        if (!id) {
            showError("Select a template first, or type in the editor.");
            return;
        }
        $.ajax({
            type: "get",
            url: "/employee/get-template/" + id + "/",
            dataType: "json",
            beforeSend: function () { if ($('#writeField').next('.note-editor').length) $('#writeField').summernote('disable'); },
            success: function (response) { setWriteFieldHtml(response.body || ''); },
            complete: function () { if ($('#writeField').next('.note-editor').length) $('#writeField').summernote('enable'); }
        });
    }

    function loadPreviewIntoWriteField() {
        var body = '';
        if ($('#writeField').next('.note-editor').length) {
            try {
                body = $('#writeField').summernote('code') || '';
            } catch (err) { body = $('#writeField').val() || ''; }
        } else {
            body = $('#writeField').val() || '';
        }
        var stripped = body.replace(/<[^>]+>/g, '').replace(/&nbsp;/g, ' ').trim();
        if (!stripped && (!body || body === '<p><br></p>')) {
            showError("Add some message body before preview.");
            return;
        }
        var form = document.getElementById('ack-form-{{ employee.id }}');
        var fd = new FormData(form);
        fd.set('body', body);
        fetch("{% url 'get-employee-mail-preview' %}{% if employee %}?emp_id={{ employee.id }}{% endif %}", {
            method: 'POST',
            headers: { 'X-CSRFToken': getCsrfToken() },
            body: fd,
            credentials: 'same-origin'
        }).then(function (r) {
            if (!r.ok) return r.text().then(function (t) { throw new Error(t || r.status); });
            return r.text();
        }).then(function (html) {
            setWriteFieldHtml(html);
        }).catch(function () { /* keep workflow */ });
    }

    function initSendMailForm() {
        var dataIds = $("#selectedInstances").attr("data-ids");
        let selectedIds = [];
        try {
            selectedIds = JSON.parse(dataIds || "[]");
        } catch (e) { selectedIds = []; }
        var $employees = $("#employees");
        if ($employees.length) $employees.val(selectedIds).change();

        {% if employee %}
        if ($('#writeField').length && typeof initializeSummernote === 'function') {
            initializeSummernote({{ employee.id }}, {{ searchWords|safe }});
        }
        {% else %}
        if (selectedIds.length > 0 && $('#writeField').length && typeof initializeSummernote === 'function') {
            initializeSummernote(selectedIds[0], {{ searchWords|safe }});
        }
        {% endif %}
    }

    // Delegated handlers so clicks work when this fragment is loaded via HTMX after DOM ready
    $(document).off('click.sendMailWrite', '#writeTabBtn').on('click.sendMailWrite', '#writeTabBtn', function (e) {
        e.preventDefault();
        e.stopPropagation();
        loadTemplateIntoWriteField();
    });
    $(document).off('click.sendMailPreview', '#previewTabBtn').on('click.sendMailPreview', '#previewTabBtn', function (e) {
        e.preventDefault();
        e.stopPropagation();
        loadPreviewIntoWriteField();
    });

    $(document).ready(function () {
        initSendMailForm();
    });

    document.body.addEventListener('htmx:afterSwap', function (ev) {
        if (ev.detail.target.querySelector && ev.detail.target.querySelector('#writeTabBtn')) {
            initSendMailForm();
        }
    });
</script>
